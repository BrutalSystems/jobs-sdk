[project]
# Distribution name is branded; the import package stays `jobs_core`.
name = "brutalsystems-jobs-core"
version = "0.1.1"
description = "Shared wire contract for jobs-service — envelope, policy, and the JOBS_* pod-env contract. The single source of truth depended on by both the SDK and the service. Import as `jobs_core`."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jobs_core"]
