[project]
name = "jobs-client"
version = "0.1.0"
description = "Python SDK for jobservice — HTTP client, pod wrapper, warm consumer, and handler registry. Consumers `pip install jobs-client` and `import jobs_client`."
requires-python = ">=3.13"
dependencies = [
    "jobs-core==0.1.0",
    "httpx>=0.27",
    "pyjwt[crypto]>=2.10.0",
    "aio-pika>=9.5",
    "prometheus-client>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jobs_client"]
