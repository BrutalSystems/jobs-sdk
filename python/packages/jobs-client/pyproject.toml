[project]
# Distribution name is branded; the import package stays `jobs_client`.
name = "brutalsystems-jobs-client"
version = "0.1.3"
description = "Python SDK for jobs-service — HTTP client, pod wrapper, warm consumer, and handler registry. `pip install brutalsystems-jobs-client`, then `import jobs_client`."
requires-python = ">=3.13"
dependencies = [
    "brutalsystems-jobs-core==0.1.2",
    "httpx>=0.27",
    "pyjwt[crypto]>=2.10.0",
    "aio-pika>=9.5",
    "prometheus-client>=0.21",
]

[project.optional-dependencies]
# Tracing is optional: handlers run fine without OpenTelemetry. Install
# `brutalsystems-jobs-client[otel]` (and launch the pod under
# `opentelemetry-instrument`) to have the wrapper emit spans and link the
# handler to the dispatch trace. The wrapper degrades to a no-op otherwise.
otel = [
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jobs_client"]
