# Virtual uv-workspace root for the Python SDK. Two distributables:
#   jobs-core   — the wire contract (Policy, envelope, the JOBS_* pod-env names)
#   jobs-client — the SDK that depends on it
# Both publish to PyPI; consumers `pip install jobs-client`.
[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
jobs-core = { workspace = true }
jobs-client = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py313"
line-length = 110

[tool.ruff.lint]
select = ["E", "W", "F", "UP", "I", "B"]
ignore = [
    "E501",  # line length — a formatter's job
    "E402",  # import-not-at-top — legitimate in entrypoint/worker modules
    "E702",  # multiple-statements-on-one-line — almost all in test setup
    "B008",  # function-call-in-default — FastAPI Depends() / Typer Option() idiom
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports are intentional, not unused imports

[tool.ruff.lint.isort]
known-first-party = ["jobs_core", "jobs_client"]
