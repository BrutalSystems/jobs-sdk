name: Release (PyPI)

# Publishes brutalsystems-jobs-core + brutalsystems-jobs-client to PyPI via
# Trusted Publishing (OIDC) — no API token is stored anywhere. Fires when you
# push a tag like `python-v0.1.0`. The tag's version should match the version
# in the package pyproject.toml files.
on:
  push:
    tags:
      - 'python-v*'

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi          # must match the environment named in the PyPI trusted publisher
    permissions:
      id-token: write          # required: lets the job mint the OIDC token PyPI exchanges for a scoped upload token
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Build both distributions (sdist + wheel)
        working-directory: python
        run: |
          uv build --package brutalsystems-jobs-core
          uv build --package brutalsystems-jobs-client
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
