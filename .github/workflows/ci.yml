name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: python

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Contract tests
        run: uv run pytest -q
      - name: Build wheels
        run: |
          uv build --package brutalsystems-jobs-core
          uv build --package brutalsystems-jobs-client
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: python/dist/*

  dotnet:
    runs-on: ubuntu-latest
    # Override the top-level python working-directory for this job.
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test
        run: dotnet test BrutalSystems.Jobs.slnx -c Release
